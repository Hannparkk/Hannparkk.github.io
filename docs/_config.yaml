title: hanna's wiki
description: just a lil wiki of hanna's random stuff she wants to keep track of.
# theme: jekyll-theme-cayman
source: docs

plugins:
  - jekyll-remote-theme


remote-theme: CloudCannon/vonge-jekyll-bookshop-template
header_pages:
  - index.md
  - books/stats.md
  - books/TBR.md
  - books/quotes.md
  - media.md

lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
  noscript: false
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge